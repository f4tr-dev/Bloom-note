<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloomNote</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#FFF8FB,#FFE4EC);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:#fff;
    width:100%;
    max-width:400px;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.logo{
    font-size:55px;
}

h1{
    color:#ff4f8b;
    margin-top:10px;
    font-size:38px;
}

p{
    margin:20px 0;
    color:#666;
    line-height:1.7;
}

button{
    background:#ff4f8b;
    color:white;
    border:none;
    padding:16px 30px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

footer{
    margin-top:25px;
    color:#999;
    font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">🌸</div>

<h1>BloomNote</h1>

<p>
Some feelings deserve more than just a text message.
Create a beautiful digital bouquet for someone you love.
</p>

<button>
💐 Create Bouquet
</button>

<footer>
Made with ❤️
</footer>

</div>

</body>
</html>
